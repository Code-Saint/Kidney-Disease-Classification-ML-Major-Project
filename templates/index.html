<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kidney Classification</title>

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
}

h3 {
    font-weight: 700;
}

.image-part {
    height:300px;
    width:300px;
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.image-part img {
    position:absolute;
    height:300px;
    width:300px;
    display:none;
}

#video {
    height:300px;
    width:300px;
}

.right-part {
    background: rgba(255,255,255,0.05);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    display:flex;
    flex-direction: column;
    justify-content: center;
}

.res-part {
    height: 250px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 36px;
    font-weight: bold;
    border-radius: 15px;
    background: rgba(0,0,0,0.6);
    text-align:center;
}

.btn {
    border-radius: 30px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-primary {
    background: linear-gradient(45deg, #1e90ff, #00c6ff);
    border: none;
}

.btn-success {
    background: linear-gradient(45deg, #00c853, #64dd17);
    border: none;
}

.btn:hover {
    transform: scale(1.05);
}

.tumor {
    color: #ff4d4d;
}

.normal {
    color: #00e676;
}

/* Loader */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: 9999;
}

.loader {
    border: 8px solid #444;
    border-top: 8px solid #00c6ff;
    border-radius: 50%;
    width: 60px;
    height: 60px;
    position: absolute;
    top: 50%;
    left: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% {transform: rotate(0deg);}
    100% {transform: rotate(360deg);}
}

/* Logo fix */
.logo {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 120px;
    opacity: 0.85;
}
</style>
</head>

<body>

<div class="container">
    <h3 class="text-center py-4">Kidney Disease Classification</h3>

    <div class="row">
        
        <!-- LEFT SIDE -->
        <div class="col-md-6 text-center">
            <div class="image-part mx-auto">
                <video autoplay id="video"></video>
                <img src="" id="photo">
                <canvas style="display:none;" id="canvas"></canvas>
            </div>

            <div class="mt-4">
                <button class="btn btn-primary px-5 mr-3" id="uload">Upload</button>
                <button class="btn btn-success px-5" id="send">Predict</button>
            </div>

            <input type="hidden" id="url" value="/predict"/>
            <input type="file" id="fileinput" style="display:none;">
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 right-part">
            <h5 class="text-center mb-3">Prediction Result</h5>
            
            <div class="row justify-content-center">
                <div class="res-part col-md-8"></div>
            </div>
        </div>

    </div>
</div>

<script>
var base_data = "";

function sendRequest(base64Data){
    if(base64Data){
        $("#loading").show();

        $.ajax({
            url : $("#url").val(),
            type: "post",
            headers: {'Content-Type': 'application/json'},
            data: JSON.stringify({image:base64Data}),

            success: function(res){
                var result = res[0].image;
                var className = result === "Tumor" ? "tumor" : "normal";

                $(".res-part").html(
                    "<div class='" + className + "'>" + result + "</div>"
                );

                $("#loading").hide();
            }
        });
    }
}

$(document).ready(function(){

    $("#loading").hide();

    $('#send').click(function(){
        sendRequest(base_data);
    });

    $('#uload').click(function(){
        $('#fileinput').click();
    });

    $("#fileinput").change(function(){
        if (this.files && this.files[0]){
            var reader = new FileReader();

            reader.onload = function (e){
                var img = new Image();

                img.onload = function(){
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');

                    canvas.height = this.height;
                    canvas.width = this.width;
                    ctx.drawImage(this, 0, 0);

                    base_data = canvas.toDataURL('image/jpeg').replace(/^data:image.+;base64,/, '');
                };

                img.src = e.target.result;
                $('#photo').attr('src', e.target.result).show();
                $('#video').hide();
            };

            reader.readAsDataURL(this.files[0]);
        }
    });

});
</script>

</body>
</html>
